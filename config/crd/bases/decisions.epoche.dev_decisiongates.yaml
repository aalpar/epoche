---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.20.1
  name: decisiongates.decisions.epoche.dev
spec:
  group: decisions.epoche.dev
  names:
    kind: DecisionGate
    listKind: DecisionGateList
    plural: decisiongates
    singular: decisiongate
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .status.phase
      name: Phase
      type: string
    - jsonPath: .spec.condition.severity
      name: Severity
      type: string
    - jsonPath: .spec.targetRef.name
      name: Target
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: |-
          DecisionGate is the Schema for the decisiongates API.
          It represents a deliberation point where a container is frozen and
          a decision is escalated to an authorized responder.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: DecisionGateSpec defines the desired state of a DecisionGate.
            properties:
              condition:
                description: condition describes why the gate was triggered.
                properties:
                  detail:
                    description: detail provides additional context about the condition.
                    type: string
                  metrics:
                    additionalProperties:
                      type: string
                    description: metrics contains key-value pairs of relevant measurements
                      at trigger time.
                    type: object
                  severity:
                    description: severity indicates the urgency of the decision.
                    enum:
                    - Info
                    - Warning
                    - Critical
                    type: string
                  summary:
                    description: summary is a human-readable one-line description
                      of the condition.
                    type: string
                  type:
                    description: type categorizes the condition (e.g. ResourcePressure,
                      Deadlock, CircuitOpen).
                    type: string
                required:
                - severity
                - summary
                - type
                type: object
              escalation:
                description: escalation defines how and to whom to escalate.
                properties:
                  allowedResponders:
                    description: allowedResponders lists entities authorized to resolve
                      this gate.
                    items:
                      description: |-
                        ResponderRef identifies an entity authorized to make the decision.
                        At least one of group, user, or serviceAccount must be set.
                      properties:
                        group:
                          description: group is a Kubernetes group name (e.g. "sre-oncall").
                          type: string
                        serviceAccount:
                          description: |-
                            serviceAccount is a namespace/name reference to a Kubernetes service account
                            authorized to resolve this gate programmatically.
                          type: string
                        user:
                          description: user is a specific user identity (e.g. "alice@company.com").
                          type: string
                      type: object
                    minItems: 1
                    type: array
                  channels:
                    description: channels lists notification targets to alert when
                      the gate is created.
                    items:
                      description: Channel defines a notification target.
                      properties:
                        properties:
                          additionalProperties:
                            type: string
                          description: properties contains channel-specific configuration
                            (e.g. serviceKey, channel, url).
                          type: object
                        type:
                          description: type identifies the notification system (e.g.
                            PagerDuty, Slack, Webhook).
                          type: string
                      required:
                      - type
                      type: object
                    type: array
                required:
                - allowedResponders
                type: object
              options:
                description: options lists the available decisions a responder can
                  choose.
                items:
                  description: Option defines one possible decision a responder can
                    choose.
                  properties:
                    description:
                      description: description explains what this option does, shown
                        to responders.
                      type: string
                    name:
                      description: |-
                        name is the identifier for this option, referenced by timeout.defaultAction
                        and decision.action.
                      type: string
                  required:
                  - description
                  - name
                  type: object
                minItems: 1
                type: array
              response:
                description: |-
                  response is filled in by a responder to resolve the gate.
                  Leave empty when creating the gate; a responder patches this field to make a decision.
                properties:
                  action:
                    description: action is the name of the chosen option. Must match
                      a name in spec.options.
                    type: string
                  reason:
                    description: reason is an optional justification for the choice.
                    type: string
                  respondedBy:
                    description: |-
                      respondedBy identifies who made the decision (e.g. "user:alice@company.com",
                      "serviceaccount:automation/memory-bot").
                    type: string
                required:
                - action
                - respondedBy
                type: object
              targetRef:
                description: targetRef identifies the pod and container to freeze.
                properties:
                  container:
                    description: container is the name of the container within the
                      pod to freeze.
                    type: string
                  kind:
                    default: Pod
                    description: kind of the target resource. Currently only "Pod"
                      is supported.
                    enum:
                    - Pod
                    type: string
                  name:
                    description: name of the target pod.
                    type: string
                required:
                - container
                - kind
                - name
                type: object
              timeout:
                description: timeout defines what happens if no decision arrives.
                properties:
                  defaultAction:
                    description: |-
                      defaultAction is the option name to execute on timeout.
                      Must match one of the names in spec.options.
                    type: string
                  duration:
                    description: |-
                      duration is how long to wait before applying the default action.
                      Uses standard Kubernetes duration format (e.g. "5m", "1h").
                    type: string
                required:
                - defaultAction
                - duration
                type: object
            required:
            - condition
            - escalation
            - options
            - targetRef
            - timeout
            type: object
          status:
            description: DecisionGateStatus defines the observed state of a DecisionGate.
            properties:
              conditions:
                description: conditions represent standard Kubernetes conditions for
                  the resource.
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - type
                x-kubernetes-list-type: map
              decision:
                description: decision records the chosen action and who chose it.
                properties:
                  action:
                    description: action is the name of the chosen option.
                    type: string
                  decidedAt:
                    description: decidedAt is when the decision was made.
                    format: date-time
                    type: string
                  decidedBy:
                    description: decidedBy identifies who made the decision.
                    type: string
                  reason:
                    description: reason is an optional human-provided justification
                      for the choice.
                    type: string
                required:
                - action
                - decidedAt
                - decidedBy
                type: object
              events:
                description: events records the lifecycle events of this gate.
                items:
                  description: GateEvent records a lifecycle event on the DecisionGate.
                  properties:
                    detail:
                      description: detail provides additional context for this event.
                      type: string
                    time:
                      description: time is when the event occurred.
                      format: date-time
                      type: string
                    type:
                      description: type categorizes this event.
                      enum:
                      - Frozen
                      - Notified
                      - Decided
                      - Executing
                      - Executed
                      - TimedOut
                      - Failed
                      - Unfrozen
                      type: string
                  required:
                  - time
                  - type
                  type: object
                type: array
              freezeTime:
                description: freezeTime is when the container was frozen.
                format: date-time
                type: string
              phase:
                description: phase is the current lifecycle phase.
                enum:
                - Pending
                - Decided
                - Executing
                - Executed
                - TimedOut
                - Failed
                type: string
            type: object
        required:
        - spec
        type: object
    served: true
    storage: true
    subresources:
      status: {}
